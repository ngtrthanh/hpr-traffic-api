name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}

  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          scope: '@ngtrthanh'

      - name: Generate package.json
        run: |
          cat > package.json << EOF
          {
            "name": "@ngtrthanh/hpr-traffic-api",
            "version": "${GITHUB_REF_NAME#v}",
            "description": "HPRadar Traffic API — aviation & maritime data explorer",
            "repository": "github:ngtrthanh/hpr-traffic-api",
            "license": "MIT",
            "main": "static/js/app.js",
            "files": ["static/", "data/*.csv", "README.md"]
          }
          EOF

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    runs-on: ubuntu-latest
    needs: [container, npm]
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} --generate-notes

  update-description:
    runs-on: ubuntu-latest
    needs: [container]
    steps:
      - name: Update repo description from stats API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATS=$(curl -sf https://traffic.hpradar.com/v1/stats || echo '{}')
          DESC=$(echo "$STATS" | python3 -c "
          import json,sys
          s=json.load(sys.stdin)
          r=s.get('aviation',{}).get('routes',0)
          sh=s.get('maritime',{}).get('ships',0)
          p=s.get('maritime',{}).get('seaports',0)
          a=s.get('aviation',{}).get('airports',0)
          if r: print(f'High-performance REST + WebSocket API for aviation and maritime traffic data. {r//1000}k routes, {sh//1000}k ships, {p//1000:.1f}k seaports, {a//1000:.1f}k airports. Zero dependencies, pure Go stdlib.')
          else: print('High-performance REST + WebSocket API for aviation and maritime traffic data. Zero dependencies, pure Go stdlib.')
          ")
          gh repo edit ${{ github.repository }} --description "$DESC"
