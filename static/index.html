<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HPRadar Traffic — Aviation & Maritime Data Explorer</title>
  <link rel="stylesheet" href="css/maplibre-gl.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="map"></div>

  <div id="shell">
    <div id="topbar">
      <span class="brand"><svg class="brand-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="22" x2="12" y2="8"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/></svg><span>HPRadar Traffic</span></span>

      <div class="search-wrap">
        <input id="searchInput" class="input" placeholder="Search ports, ships, flights..." oninput="onSearchInput()" onkeydown="onSearchKey(event)" onfocus="onSearchInput()" onblur="setTimeout(hideSearchResults,200)">
        <div id="searchResults"></div>
      </div>

      <span class="spacer"></span>
      <div id="topbar-fixed">
        <span class="pill" style="--pill-c:var(--port-major)"><span class="n" id="sRoutes">—</span> flights</span>
        <span class="pill" style="--pill-c:var(--port-medium)"><span class="n" id="sPorts">—</span> ports</span>
        <span class="pill" style="--pill-c:var(--airport)"><span class="n" id="sAirports">—</span> airports</span>
        <span class="pill" style="--pill-c:#94a3b8"><span class="n" id="sShips">—</span> ships</span>
        <span class="pill" style="--pill-c:#f59e0b"><span class="n" id="sCompanies">—</span> operators</span>
        <button class="btn btn-icon" id="theme-tog" onclick="toggleTheme()" title="Toggle theme"></button>
      </div>
    </div>

    <div id="view-map">
      <nav id="rail">
        <div class="rail-item">
          <button class="rail-btn" onclick="railToggle('layersPop')" title="Layers"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg><span>Layers</span></button>
          <div class="rail-pop" id="layersPop"></div>
        </div>
        <div class="rail-item">
          <button class="rail-btn" onclick="railToggle('mapPop')" title="Map"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg><span>Map</span></button>
          <div class="rail-pop" id="mapPop"></div>
        </div>
        <div class="rail-item">
          <button class="rail-btn" onclick="railToggle('regionPop')" title="Region"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span>Region</span></button>
          <div class="rail-pop" id="regionPop"></div>
        </div>
        <button class="rail-btn" id="railListBtn" onclick="toggleList()" title="Data list"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg><span>List</span></button>
        <button class="rail-btn" id="railApiBtn" onclick="toggleApi()" title="API Guide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg><span>API</span></button>
        <span class="rail-spacer"></span>
        <div class="rail-item">
          <button class="rail-btn" onclick="railToggle('settingsPop')" title="Settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/></svg><span>Settings</span></button>
          <div class="rail-pop" id="settingsPop"></div>
        </div>
      </nav>

      <!-- Left: data list -->
      <div id="vlist">
        <div class="vlist-tabs">
          <button class="vtab on" data-tab="ports" onclick="setListTab('ports')">Ports</button>
          <button class="vtab" data-tab="airports" onclick="setListTab('airports')">Airports</button>
          <button class="vtab" data-tab="airlines" onclick="setListTab('airlines')">Airlines</button>
        </div>
        <div id="vlistRows" class="vlist-rows"></div>
      </div>

      <!-- Left: API guide -->
      <div id="apiguide">
        <div class="vlist-tabs">
          <button class="vtab on" data-tab="quickstart" onclick="setGuideTab('quickstart')">Quick Start</button>
          <button class="vtab" data-tab="endpoints" onclick="setGuideTab('endpoints')">Endpoints</button>
          <button class="vtab" data-tab="mcp" onclick="setGuideTab('mcp')">MCP</button>
          <button class="vtab" data-tab="code" onclick="setGuideTab('code')">Code</button>
          <button class="vtab" data-tab="binary" onclick="setGuideTab('binary')">Binary</button>
        </div>
        <div id="guideContent" class="guide-content"></div>
      </div>

      <!-- Right: detail card -->
      <div id="pcard">
        <div class="sc-head">
          <div class="sc-title"><span id="pcardIcon"></span><span id="pcardName" class="sc-name">—</span><span id="pcardType" class="sc-type"></span></div>
          <div class="sc-meta" id="pcardMeta"></div>
          <button class="close btn-icon" onclick="closeCard()" title="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
        <div id="pcardBody" class="sc-body"></div>
        <div id="pcardActions" class="sc-actions"></div>
      </div>
    </div>
  </div>

  <script src="js/maplibre-gl.js" data-cfasync="false"></script>
  <script src="js/app.js" data-cfasync="false"></script>
</body>
</html>
